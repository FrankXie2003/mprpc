syntax = "proto3"; // 声明了protobuf的版本

package fixbug; // 声明了代码所在的包(对于C++来说是命名空间namespace)

// 定义下面的选项，表示生辰service服务类和rpc方法描述，默认不生成
option cc_generic_services = true;

message ResultCode
{
    int32 errcode = 1; // 定义了一个32位整数类型的字段，字段编号为1
    bytes errmsg = 2; // 定义了一个字符串类型的字段，字段编号为2
}

// 数据 列表 映射表
// 定义登录请求消息类型 name pwd
message LoginRequest
{
    bytes name = 1; // 定义了一个字符串类型的字段，字段编号为1
    bytes pwd = 2; // 定义了一个字符串类型的字段，字段编号为2
}

// 定义登录响应消息类型
message LoginResponse
{
    ResultCode result = 1; // 定义了一个ResultCode类型的字段，字段编号为1
    bool success = 2; // 定义了一个布尔类型的字段，字段编号为2
}

message GetFriendListRequest
{
    uint32 userid = 1; // 定义了一个32位整数类型的字段，字段编号为1
}

message User
{
    bytes name = 1;
    uint32 age = 2;
    enum Sex
    {
        MAN = 0;
        WOMAN = 1;
    }
    Sex sex = 3;
}

message GetFriendListResponse
{
    ResultCode result = 1; // 定义了一个ResultCode类型的字段，字段编号为1
    repeated User friend_list = 2; // 定义了一个列表类型的字段，字段编号为2，列表中的元素类型为User
}

// 在protobuf中定义描述rpc方法的类型 - > service
service UserServiceRpc
{
    rpc Login(LoginRequest) returns (LoginResponse); // 定义了一个名为Login的rpc方法，输入参数类型为LoginRequest，返回值类型为LoginResponse
    rpc GetFriendList(GetFriendListRequest) returns (GetFriendListResponse); // 定义了一个名为GetFriendList的rpc方法，输入参数类型为GetFriendListRequest，返回值类型为GetFriendListResponse
}